<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EDEN — Editor for the new world</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    /* Dark — brutal-dark default */
    --bg: #0c0b0a;
    --bg-elev: #131210;
    --bg-2: #181714;
    --fg: #f1ede4;
    --fg-2: #b8b2a5;
    --fg-3: #7a7468;
    --fg-4: #4a4640;
    --rule: #25231f;
    --rule-2: #1d1c19;
    --accent: oklch(0.68 0.21 32);
    --accent-soft: oklch(0.68 0.21 32 / 0.14);
    --accent-glow: oklch(0.68 0.21 32 / 0.35);
    --warn: oklch(0.78 0.16 85);
    --good: oklch(0.72 0.13 150);
    --bad: oklch(0.66 0.21 25);
    --add: oklch(0.72 0.13 150 / 0.18);
    --rm: oklch(0.66 0.21 25 / 0.18);

    /* type */
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --serif: 'Instrument Serif', Georgia, serif;
    --font-display: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --font-ui: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --display-tracking: -0.04em;
    --label-tracking: 0.14em;
    --radius: 0px;
    --scan: 0;
    --theme-name: "BRUTAL · DARK";

    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
    --ease-spring: cubic-bezier(0.34, 1.4, 0.64, 1);
  }

  :root[data-theme="brutal-light"] {
    --bg: #f4f1ea;
    --bg-elev: #ecebe2;
    --bg-2: #e5e1d4;
    --fg: #0c0b0a;
    --fg-2: #3d3a33;
    --fg-3: #6e6a5e;
    --fg-4: #a39d8e;
    --rule: #d6d1c3;
    --rule-2: #e0dbcd;
    --theme-name: "BRUTAL · LIGHT";
  }

  /* ── TOKYO 89 — 90s Japanese premium (Trinitron / MUJI / Issey Miyake) ── */
  :root[data-theme="tokyo89"] {
    --bg: #efe8d4;
    --bg-elev: #e7dfc7;
    --bg-2: #ddd3b6;
    --fg: #1a1612;
    --fg-2: #4d4438;
    --fg-3: #7a6f5d;
    --fg-4: #a89c87;
    --rule: #c8c0a9;
    --rule-2: #d6cfba;
    --accent: oklch(0.55 0.19 32);
    --accent-soft: oklch(0.55 0.19 32 / 0.14);
    --accent-glow: oklch(0.55 0.19 32 / 0.30);
    --warn: oklch(0.62 0.14 80);
    --good: oklch(0.55 0.12 150);
    --bad:  oklch(0.55 0.19 25);
    --font-display: 'Shippori Mincho', 'Noto Serif JP', serif;
    --font-ui: 'Noto Sans JP', 'JetBrains Mono', sans-serif;
    --display-tracking: -0.02em;
    --label-tracking: 0.22em;
    --theme-name: "東京 89";
  }

  /* ── PACIFIC — Apple calm, soft cool, generous ── */
  :root[data-theme="pacific"] {
    --bg: #f5f7fa;
    --bg-elev: #ffffff;
    --bg-2: #eef2f7;
    --fg: #1d2433;
    --fg-2: #4a5360;
    --fg-3: #8a93a0;
    --fg-4: #c3c9d3;
    --rule: #e3e7ed;
    --rule-2: #eef1f5;
    --accent: oklch(0.62 0.15 248);
    --accent-soft: oklch(0.62 0.15 248 / 0.10);
    --accent-glow: oklch(0.62 0.15 248 / 0.28);
    --warn: oklch(0.74 0.13 75);
    --good: oklch(0.68 0.13 160);
    --bad:  oklch(0.62 0.18 25);
    --font-display: 'Manrope', -apple-system, sans-serif;
    --font-ui: 'Manrope', -apple-system, sans-serif;
    --display-tracking: -0.035em;
    --label-tracking: 0.10em;
    --radius: 6px;
    --theme-name: "PACIFIC";
  }

  /* ── PHOSPHOR — CRT terminal, monochrome green ── */
  :root[data-theme="phosphor"] {
    --bg: #050c08;
    --bg-elev: #081610;
    --bg-2: #0c1f17;
    --fg: oklch(0.85 0.16 145);
    --fg-2: oklch(0.66 0.14 145);
    --fg-3: oklch(0.48 0.11 145);
    --fg-4: oklch(0.36 0.08 145);
    --rule: oklch(0.30 0.07 145);
    --rule-2: oklch(0.22 0.05 145);
    --accent: oklch(0.88 0.18 90);
    --accent-soft: oklch(0.88 0.18 90 / 0.16);
    --accent-glow: oklch(0.88 0.18 90 / 0.50);
    --warn: oklch(0.85 0.17 65);
    --good: oklch(0.85 0.18 145);
    --bad:  oklch(0.70 0.22 25);
    --label-tracking: 0.20em;
    --scan: 1;
    --theme-name: "PHOSPHOR";
  }

  /* ── NEWSPRINT — broadsheet editorial ── */
  :root[data-theme="newsprint"] {
    --bg: #f1ebda;
    --bg-elev: #ebe4cd;
    --bg-2: #e2dabe;
    --fg: #0e0c08;
    --fg-2: #3a3328;
    --fg-3: #6a604f;
    --fg-4: #a09680;
    --rule: #c4baa1;
    --rule-2: #d4cbb2;
    --accent: oklch(0.50 0.18 28);
    --accent-soft: oklch(0.50 0.18 28 / 0.12);
    --accent-glow: oklch(0.50 0.18 28 / 0.30);
    --warn: oklch(0.55 0.14 75);
    --good: oklch(0.50 0.11 150);
    --bad:  oklch(0.50 0.18 25);
    --font-display: 'Newsreader', 'Times New Roman', serif;
    --font-ui: 'Newsreader', 'JetBrains Mono', serif;
    --display-tracking: -0.025em;
    --label-tracking: 0.18em;
    --theme-name: "BROADSHEET";
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-ui); height: 100%; overflow: hidden; }
  body { font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

  /* code surfaces always mono regardless of theme */
  .code-mono, pre, code { font-family: var(--mono); }

  #root { width: 100vw; height: 100vh; }

  /* Editorial type utility classes */
  .label { font-family: var(--font-ui); font-size: 10px; letter-spacing: var(--label-tracking); text-transform: uppercase; color: var(--fg-3); font-weight: 500; }
  .label-strong { font-family: var(--font-ui); font-size: 10px; letter-spacing: var(--label-tracking); text-transform: uppercase; color: var(--fg); font-weight: 600; }
  .display { font-family: var(--font-display); letter-spacing: var(--display-tracking); }
  .num { font-feature-settings: "tnum" 1; }
  .serif { font-family: var(--serif); font-style: italic; }
  .rule { background: var(--rule); }
  .hairline-b { border-bottom: 1px solid var(--rule); }
  .hairline-t { border-top: 1px solid var(--rule); }
  .hairline-l { border-left: 1px solid var(--rule); }
  .hairline-r { border-right: 1px solid var(--rule); }

  /* Phosphor theme — scanlines, vignette, glow */
  :root[data-theme="phosphor"] body {
    text-shadow: 0 0 6px oklch(0.85 0.18 145 / 0.35);
  }
  :root[data-theme="phosphor"] body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.18) 0px,
      rgba(0,0,0,0.18) 1px,
      transparent 1px,
      transparent 3px);
    z-index: 9999;
    animation: scanFlicker 5s linear infinite;
  }
  :root[data-theme="phosphor"] body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.45) 100%);
    z-index: 9998;
  }
  @keyframes scanFlicker {
    0%,97%,100% { opacity: 1; }
    98% { opacity: 0.85; }
    99% { opacity: 0.95; }
  }

  /* Newsprint — subtle paper grain */
  :root[data-theme="newsprint"] body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.018) 1px, transparent 1px),
      radial-gradient(circle at 70% 70%, rgba(0,0,0,0.018) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    z-index: 9998;
  }

  /* Pacific — softer rules + slight surface lift */
  :root[data-theme="pacific"] .surface-card {
    border-radius: var(--radius);
    box-shadow: 0 1px 0 rgba(15,23,42,0.04), 0 10px 30px rgba(15,23,42,0.06);
  }

  /* scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-4); }

  /* selection */
  ::selection { background: var(--accent-soft); color: var(--fg); }

  /* keyframes */
  @keyframes diffSettle {
    0%   { transform: translateX(-8px); opacity: 0; background: var(--accent-soft); }
    40%  { transform: translateX(0);    opacity: 1; background: var(--accent-soft); }
    100% { transform: translateX(0);    opacity: 1; background: transparent; }
  }
  @keyframes diffGlow {
    0%   { box-shadow: inset 2px 0 0 var(--accent), 0 0 0 0 var(--accent-glow); }
    100% { box-shadow: inset 2px 0 0 transparent, 0 0 0 0 transparent; }
  }
  @keyframes cursorBlink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(1px,1px); } }

  /* App-wide focus ring */
  button:focus-visible, [role="button"]:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 2px;
  }
  button { font-family: inherit; }

  /* Loader fallback */
  .boot {
    position: fixed; inset: 0; display: grid; place-items: center;
    color: var(--fg-3); font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div id="root"><div class="boot">EDEN · BOOTING</div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="editor.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
